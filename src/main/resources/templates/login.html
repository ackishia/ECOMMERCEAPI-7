<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Login</title>
</head>

<body>

<h2>Login</h2>

<form method="post" action="/login">

  <div>
    <label>Username:</label>
    <input type="text"
           name="username"
           required>
  </div>

  <br>

  <div>
    <label>Password:</label>
    <input type="password"
           name="password"
           required>
  </div>

  <!-- CSRF TOKEN -->
  <input type="hidden"
         th:name="${_csrf.parameterName}"
         th:value="${_csrf.token}" />

  <br>

  <button type="submit">
    Login
  </button>

</form>

</body>
</html>
